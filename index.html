<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B. Collins Review Master | Google Review Generator</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Generate professional Google Reviews for B. Collins Plumbing Galway in seconds.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A2540;
            --accent: #00B4D8;
            --success: #25D366;
            --bg: #F8FAFC;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: linear-gradient(rgba(10, 37, 64, 0.1), rgba(10, 37, 64, 0.1)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .progress-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .step-dot {
            width: 40px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--accent);
            width: 60px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .option-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0,180,216,0.2);
        }

        .option-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .emoji {
            font-size: 1.2rem;
            margin-right: 12px;
        }

        .textarea-container {
            margin-top: 16px;
        }

        textarea {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            background: rgba(255,255,255,0.5);
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(0, 180, 216, 0.39);
        }

        .btn-primary:hover {
            background: #0096b4;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(10, 37, 64, 0.05);
            color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(37, 211, 102, 0.39);
        }

        .result-area {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid rgba(0,0,0,0.05);
            min-height: 120px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
            position: relative;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0;
            padding: 0 4px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .copied-badge {
            position: absolute;
            top: -10px;
            right: 10px;
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .copied-badge.show {
            opacity: 1;
        }

        /* Responsive Tweak */
        @media (max-width: 400px) {
            .glass-card {
                padding: 24px 20px;
            }
            .option-btn {
                padding: 14px;
            }
        }
    </style>
</head>
<body>


<div class="app-container">
    <div class="glass-card">
        <header>
            <div class="logo-text">B. COLLINS <span>PLUMBING</span></div>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 4px;">Review Master &bull; Galway</p>
        </header>

        <div class="progress-bar">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
            <div class="step-dot" id="dot-3"></div>
            <div class="step-dot" id="dot-4"></div>
        </div>

        <!-- Step 1: Service -->
        <div class="step-content active" id="step-1">
            <h2>Select Service</h2>
            <div class="grid-options">
                <button class="option-btn" onclick="selectService('Emergency Plumbing')">Emergency Plumbing <span>⚡</span></button>
                <button class="option-btn" onclick="selectService('Boiler Service')">Boiler Service <span>🔥</span></button>
                <button class="option-btn" onclick="selectService('Bathroom Renovation')">Bathroom Renovation <span>🚿</span></button>
                <button class="option-btn" onclick="selectService('Leak Detection')">Leak Detection <span>🔍</span></button>
            </div>
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.1);">
                <p style="font-size: 0.85rem; font-weight: 500; margin-bottom: 10px; color: #64748b;">Or type your service:</p>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="custom-service-input" placeholder="e.g. Garden Tap Repair" style="flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; outline: none; background: rgba(255,255,255,0.5);">
                    <button class="btn btn-primary" style="flex: 0; padding: 0 20px; white-space: nowrap;" onclick="selectCustomService()">Next</button>
                </div>
            </div>
        </div>

        <!-- Step 2: Task -->
        <div class="step-content" id="step-2">
            <h2>What was done?</h2>
            <div class="grid-options">
                <button class="option-btn" onclick="selectTask('Repair')">Repair <span>🔧</span></button>
                <button class="option-btn" onclick="selectTask('New Installation')">New Installation <span>✨</span></button>
                <button class="option-btn" onclick="selectTask('Maintenance')">Maintenance <span>🛠️</span></button>
            </div>
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.1);">
                <p style="font-size: 0.85rem; font-weight: 500; margin-bottom: 10px; color: #64748b;">Or type what was done:</p>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="custom-task-input" placeholder="e.g. Unblocked a sink" style="flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; outline: none; background: rgba(255,255,255,0.5);">
                    <button class="btn btn-primary" style="flex: 0; padding: 0 20px; white-space: nowrap;" onclick="selectCustomTask()">Next</button>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="prevStep()">Back</button>
            </div>
        </div>

        <!-- Step 3: Experience -->
        <div class="step-content" id="step-3">
            <h2>Your Experience</h2>
            <div class="grid-options">
                <button class="option-btn" onclick="selectExperience('Exceptional', '🤩')">🤩 Exceptional</button>
                <button class="option-btn" onclick="selectExperience('Good', '🙂')">🙂 Good</button>
                <button class="option-btn" onclick="selectExperience('Average', '😐')">😐 Average</button>
            </div>
            
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.1);">
                <p style="font-size: 0.85rem; font-weight: 500; margin-bottom: 10px; color: #64748b;">Or describe your experience in your own words:</p>
                <textarea id="custom-experience-input" rows="2" placeholder="e.g. Brian was incredibly professional and left the place spotless..." style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; outline: none; background: rgba(255,255,255,0.5); resize: none;"></textarea>
            </div>

            <div class="textarea-container" style="margin-top: 16px;">
                <p style="font-size: 0.85rem; font-weight: 500; margin-bottom: 8px;">Add specific details (optional):</p>
                <textarea id="additional-details" rows="2" placeholder="e.g. Highly recommend for any plumbing job." style="resize: none;"></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" onclick="prevStep()">Back</button>
                <button class="btn btn-primary" onclick="generateReview()">Generate Review ✨</button>
            </div>
        </div>

        <!-- Result Step -->
        <div class="step-content" id="step-4">
            <h2>Success! Your Review</h2>
            <div class="result-area" id="result-text">
                <!-- Generated text goes here -->
                <div class="copied-badge" id="copied-badge">Copied!</div>
            </div>

            <div class="actions" style="flex-direction: column; margin-top: 32px;">
                <button class="btn btn-primary" onclick="copyToClipboard()">
                    Copy Review 📋
                </button>
                <button class="btn btn-success" onclick="postOnGoogle()">
                    Post on Google 🌟
                </button>
                <button class="btn btn-secondary" onclick="generateReview()">
                    Try Different Phrasing 🔄
                </button>
                <button class="btn btn-secondary" style="background: none; font-size: 0.9rem;" onclick="resetApp()">
                    Start Over
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStep = 1;
    let selections = {
        service: '',
        task: '',
        experience: '',
        emoji: '',
        details: ''
    };

    const GROQ_API_KEY = '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';

    const templates = [
        "Absolutely thrilled with the {task} on our {service} by B. Collins Plumbing. Their professionalism and timeliness really stood out here in Galway. The standard of work was exceptional, and I wouldn't hesitate to recommend them to anyone needing a reliable plumber. {details}",
        "B. Collins Plumbing just completed a {service} {task} and I couldn't be happier. From start to finish, their professionalism was evident. They arrived on time (great timeliness!) and sorted everything perfectly. Definitely the best in Galway. {details}",
        "Needed a {service} {task} done urgently and B. Collins Plumbing delivered. Excellent professionalism and impressive timeliness, which is rare these days. Great to have such service available in Galway. {details}",
        "I highly recommend B. Collins for any {service}. They just did a {task} for me and the level of professionalism was outstanding. Their timeliness made the whole process stress-free. A real asset to the Galway community. {details}",
        "If you're in Galway and need a plumber, look no further than B. Collins. Their professionalism and timeliness during our {service} {task} were exactly what we hoped for. A top-tier experience all around. {details}"
    ];

    function updateDots() {
        document.querySelectorAll('.step-dot').forEach((dot, index) => {
            if (index + 1 <= currentStep) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    function showStep(step) {
        document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${step}`).classList.add('active');
        currentStep = step;
        updateDots();
    }

    function selectService(service) {
        selections.service = service;
        showStep(2);
    }

    function selectCustomService() {
        const val = document.getElementById('custom-service-input').value.trim();
        if (!val) { alert("Please type your service name"); return; }
        selections.service = val;
        showStep(2);
    }

    function selectTask(task) {
        selections.task = task;
        showStep(3);
    }

    function selectCustomTask() {
        const val = document.getElementById('custom-task-input').value.trim();
        if (!val) { alert("Please type what was done"); return; }
        selections.task = val;
        showStep(3);
    }

    function selectExperience(exp, emoji) {
        selections.experience = exp;
        selections.emoji = emoji;
        document.querySelectorAll('#step-3 .option-btn').forEach(btn => {
            if (btn.innerText.includes(exp)) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
        // Clear custom input if a button is clicked
        document.getElementById('custom-experience-input').value = '';
    }

    function prevStep() {
        if (currentStep > 1) showStep(currentStep - 1);
    }

    async function generateReview() {
        const customExp = document.getElementById('custom-experience-input').value.trim();
        
        if (!selections.experience && !customExp) {
            alert("Please select your experience or type it in your own words!");
            return;
        }

        selections.details = document.getElementById('additional-details').value.trim();
        const experienceValue = customExp || selections.experience;
        
        // Show loading state
        const genBtn = document.querySelector('#step-3 .btn-primary');
        const regenBtn = document.querySelector('#step-4 .actions .btn-secondary:nth-child(3)');
        const originalText = "Generate Review ✨";
        
        if (currentStep === 3) {
            genBtn.innerHTML = 'Generating Review... ✨';
            genBtn.disabled = true;
        } else if (regenBtn) {
            regenBtn.innerHTML = 'Thinking... 🔄';
            regenBtn.disabled = true;
        }

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {
                            role: "system",
                            content: "You are a customer writing a Google review for B. Collins Plumbing in Galway, Ireland. Use a professional, human, and grateful tone. Keep it simple and authentic (50-100 words). You must mention 'professionalism', 'timeliness', and 'Galway'. Avoid clichés like 'best in the world' or overly robotic phrases. Sound like a real neighbor. CRITICAL: DO NOT use any emojis in your response."
                        },
                        {
                            role: "user",
                            content: `Service: ${selections.service}, Task Type: ${selections.task}, Experience Level/Description: ${experienceValue}. Additional details: ${selections.details || 'None'}.`
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 200
                })
            });

            if (!response.ok) throw new Error('API request failed');

            const data = await response.json();
            let review = data.choices[0].message.content.trim();
            
            review = review.replace(/^["']|["']$/g, '');

            document.getElementById('result-text').innerText = review;
            showStep(4);
        } catch (error) {
            console.error("AI Generation failed, falling back to local Templates:", error);
            let template = templates[Math.floor(Math.random() * templates.length)];
            let review = template
                .replace('{service}', selections.service.toLowerCase())
                .replace('{task}', selections.task.toLowerCase())
                .replace('{details}', selections.details ? ` ${selections.details}.` : '');

            document.getElementById('result-text').innerText = review;
            showStep(4);
        } finally {
            genBtn.innerHTML = "Generate Review ✨";
            genBtn.disabled = false;
            if (regenBtn) {
                regenBtn.innerHTML = "Try Different Phrasing 🔄";
                regenBtn.disabled = false;
            }
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('result-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const badge = document.getElementById('copied-badge');
            badge.classList.add('show');
            setTimeout(() => badge.classList.remove('show'), 2000);
        });
    }

    function postOnGoogle() {
        window.open('https://maps.app.goo.gl/TgcvRRod1fpEndWY8', '_blank');
    }

    function resetApp() {
        selections = { service: '', task: '', experience: '', emoji: '', details: '' };
        document.getElementById('additional-details').value = '';
        document.getElementById('custom-service-input').value = '';
        document.getElementById('custom-task-input').value = '';
        document.getElementById('custom-experience-input').value = '';
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        showStep(1);
    }

        showStep(1);
    }
</script>

</body>
</html>
