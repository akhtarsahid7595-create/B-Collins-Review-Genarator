<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Nature Review Master | Google Review Generator</title>
<meta name="description" content="Generate professional Google Reviews for Green Nature Garden and Landscaping Cork.">
<meta name="keywords" content="Green Nature, Garden Maintenance Cork, Landscaping Cork, Google Review Generator">
<meta property="og:title" content="Green Nature Review Master">
<meta property="og:description" content="Generate professional reviews for Green Nature Garden and Landscaping Cork.">
<meta property="og:image" content="Logo.2o.jpeg">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpeg" href="Logo.2o.jpeg">
<style>
:root {
  --primary: #1b4d3e;
  --primary-light: #2a6b57;
  --accent: #2ecc71;
  --success: #27ae60;
  --bg: #0b1a13;
  --sidebar-bg: #071210;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --whatsapp: #25D366;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== LAYOUT CONTROL ===== */
.desktop-layout, .mobile-layout { display: none; }
@media(min-width:768px){
  body{background-image:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('bg.png');background-size:cover;background-attachment:fixed;}
  .mobile-layout{display:none;}
  .desktop-layout{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{width:320px;min-height:100vh;background:rgba(7,18,16,0.92);backdrop-filter:blur(20px);border-right:1px solid rgba(46,204,113,0.15);display:flex;flex-direction:column;padding:40px 32px;position:sticky;top:0;}
  .sidebar-logo{text-align:center;margin-bottom:40px;}
  .sidebar-logo img{width:180px;height:auto;border-radius:12px;}
  .sidebar-tagline{font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:10px;letter-spacing:1px;text-transform:uppercase;}

  .sidebar-steps{flex:1;}
  .sidebar-step{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;margin-bottom:8px;transition:all 0.3s;cursor:default;}
  .sidebar-step.active{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);}
  .sidebar-step.done{opacity:0.6;}
  .sidebar-step .step-num{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;transition:all 0.3s;}
  .sidebar-step.active .step-num{background:var(--accent);border-color:var(--accent);color:#000;}
  .sidebar-step.done .step-num{background:var(--success);border-color:var(--success);color:#fff;}
  .sidebar-step .step-info .step-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
  .sidebar-step .step-info .step-name{font-size:0.95rem;font-weight:600;color:var(--text);margin-top:2px;}
  .sidebar-step.active .step-info .step-name{color:var(--accent);}

  .sidebar-contact{border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;margin-top:auto;}
  .sidebar-contact p{font-size:0.75rem;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}

  /* Main Content */
  .main-content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;}
  .content-card{width:100%;max-width:560px;background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:48px 44px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:slideUp 0.5s ease-out;}
}

/* ===== MOBILE LAYOUT ===== */
@media(max-width:767px){
  .mobile-layout{display:flex;min-height:100vh;background-image:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),url('bg.png');background-size:cover;background-attachment:fixed;justify-content:center;align-items:center;padding:16px;}
  .mobile-card{width:100%;max-width:440px;background:rgba(20, 30, 25, 0.7);backdrop-filter:blur(25px);border:1px solid rgba(46, 204, 113, 0.2);border-radius:32px;padding:32px 24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);animation:slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);}
  .mobile-header{text-align:center;margin-bottom:28px;}
  .logo-container{display:inline-block;background:rgba(255,255,255,0.03);padding:12px;border-radius:20px;border:1px solid rgba(255,255,255,0.05);margin-bottom:12px;box-shadow:inset 0 0 20px rgba(46, 204, 113, 0.05);}
  .mobile-header img{width:150px;height:auto;display:block;}
  .mobile-header p{font-size:0.8rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:600;opacity:0.9;}
  .progress-bar{margin-bottom:32px;gap:12px;}
  .step-dot{height:4px;border-radius:2px;}
}

@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);}}

/* ===== SHARED FORM STYLES ===== */
.progress-bar{display:flex;gap:8px;margin-bottom:28px;justify-content:center;}
.step-dot{width:36px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;transition:all 0.3s;}
.step-dot.active{background:var(--accent);width:56px;}
h2{font-size:1.2rem;font-weight:700;margin-bottom:18px;text-align:center;letter-spacing:-0.3px;}
.step-content{display:none;}
.step-content.active{display:block;animation:fadeIn 0.35s ease-in-out;}

.grid-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:400px){.grid-options{grid-template-columns:1fr;}}

.option-btn{background:rgba(255,255,255,0.05);border:2px solid transparent;border-radius:14px;padding:14px 12px;font-size:0.9rem;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);text-align:center;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;}
.option-btn:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(46,204,113,0.08);}
.option-btn.selected{background:var(--primary);border-color:var(--accent);color:white;}

.divider{margin:20px 0;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);}
.divider p{font-size:0.8rem;font-weight:500;margin-bottom:10px;color:var(--text-muted);}
.input-row{display:flex;gap:8px;}
input[type="text"],textarea{flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);font-family:'Montserrat',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;background:rgba(255,255,255,0.05);color:white;}
input[type="text"]:focus,textarea:focus{border-color:var(--accent);}
textarea{width:100%;resize:none;line-height:1.5;}

.actions{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;padding:14px;border-radius:14px;font-weight:600;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Montserrat',sans-serif;}
.btn-primary{background:var(--accent);color:#000;box-shadow:0 4px 20px rgba(46,204,113,0.35);}
.btn-primary:hover{background:#27ae60;transform:translateY(-2px);}
.btn-secondary{background:rgba(255,255,255,0.08);color:var(--text);}
.btn-secondary:hover{background:rgba(255,255,255,0.14);}
.btn-success{background:var(--success);color:white;box-shadow:0 4px 14px rgba(37,211,102,0.35);}

.result-area{background:rgba(0,0,0,0.35);border-radius:16px;padding:20px;margin-top:14px;border:1px solid rgba(255,255,255,0.1);min-height:120px;font-size:0.92rem;line-height:1.7;color:#e2e8f0;position:relative;}
.copied-badge{position:absolute;top:-10px;right:10px;background:var(--success);color:white;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.copied-badge.show{opacity:1;}

.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn-row{display:flex;gap:10px;}
.btn-regen{background:rgba(255,255,255,0.06);color:var(--text-muted);font-size:0.88rem;}
.btn-restart{background:none;font-size:0.85rem;color:var(--text-muted);padding:10px;}
.btn-restart:hover{color:var(--text);}

/* Desktop overrides for desktop form */
@media(min-width:768px){
  .grid-options{grid-template-columns:1fr 1fr 1fr;}
  .option-btn{padding:16px 14px;font-size:0.88rem;}
  h2{font-size:1.4rem;margin-bottom:22px;}
}
</style>
</head>
<body>

<!-- ===== DESKTOP LAYOUT ===== -->
<div class="desktop-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="Logo.2o.jpeg" alt="Green Nature Garden Logo">
      <p class="sidebar-tagline">Premium Landscaping · Cork</p>
    </div>
    <div class="sidebar-steps" id="sidebar-steps">
      <div class="sidebar-step active" id="dstep-1">
        <div class="step-num">1</div>
        <div class="step-info"><div class="step-label">Step 1</div><div class="step-name">Select Service</div></div>
      </div>
      <div class="sidebar-step" id="dstep-2">
        <div class="step-num">2</div>
        <div class="step-info"><div class="step-label">Step 2</div><div class="step-name">What Was Done?</div></div>
      </div>
      <div class="sidebar-step" id="dstep-3">
        <div class="step-num">3</div>
        <div class="step-info"><div class="step-label">Step 3</div><div class="step-name">Your Experience</div></div>
      </div>
      <div class="sidebar-step" id="dstep-4">
        <div class="step-num">4</div>
        <div class="step-info"><div class="step-label">Done!</div><div class="step-name">Your Review</div></div>
      </div>
    </div>
    <div class="sidebar-contact">
      <p>Need Help?</p>
      <div style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 12px;">
        If you have any issues generating your review, please contact our support team.
      </div>
      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <a href="https://greennaturegarden.com" target="_blank" class="btn" style="background: rgba(46, 204, 113, 0.1); color: var(--accent); border: 1px solid rgba(46, 204, 113, 0.3); text-decoration: none; font-size: 0.85rem; width: 100%;">
          Explore Our Services
        </a>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="content-card" id="desktop-form">
      <!-- Form steps injected by JS -->
    </div>
  </main>
</div>

<!-- ===== MOBILE LAYOUT ===== -->
<div class="mobile-layout">
  <div class="mobile-card">
    <div class="mobile-header">
      <div class="logo-container">
        <img src="Logo.2o.jpeg" alt="Green Nature Garden Logo">
      </div>
      <p>Premium Landscaping · Cork</p>
    </div>
    <div class="progress-bar">
      <div class="step-dot active" id="mdot-1"></div>
      <div class="step-dot" id="mdot-2"></div>
      <div class="step-dot" id="mdot-3"></div>
      <div class="step-dot" id="mdot-4"></div>
    </div>
    <div id="mobile-form"></div>
    <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
      <a href="https://greennaturegarden.com" target="_blank" class="btn" style="background: rgba(46, 204, 113, 0.1); color: var(--accent); border: 1px solid rgba(46, 204, 113, 0.3); text-decoration: none; font-size: 0.8rem; display: inline-flex; width: 100%;">
        Explore Our Services
      </a>
    </div>
  </div>
</div>

<script>
let currentStep = 1;
let selections = { service:'', task:'', experience:'', details:'' };
const GROQ_API_KEY = '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';

const services = [
  'Lawn Mowing','Fencing Installation','Garden Maintenance',
  'Hedge Trimming','Landscape Design','Tree Surgeon',
  'Sod Installation','Pressure Washing','Weed Control','Irrigation Systems'
];

const templates = [
  "Absolutely thrilled with the {task} on our {service} by Green Nature Garden. Their attention to detail and professional approach really stood out here in Cork. The garden looks exceptional — highly recommended. {details}",
  "Green Nature Garden completed a {service} {task} and I couldn't be happier. Their expertise in Cork landscaping was evident from start to finish. Arrived on time, brilliant results. {details}",
  "Needed a {service} {task} done and Green Nature delivered. Excellent professionalism and outstanding results — great to have such a reliable team available in Cork. {details}",
  "I highly recommend Green Nature for {service}. The {task} they completed was of outstanding craftsmanship. My garden has never looked better. A real asset to Frankfield and Douglas. {details}",
  "If you're in Cork and need landscaping, look no further. Their professionalism during our {service} {task} was top-tier. Attention to detail was second to none. {details}"
];

function getFormHTML(step) {
  if (step === 1) return `
    <h2>Select Service</h2>
    <div class="grid-options">${services.map(s=>`<button class="option-btn" onclick="selectService('${s}')">${s}</button>`).join('')}</div>
    <div class="divider"><p>Or type your service:</p>
    <div class="input-row"><input type="text" id="custom-service-input" placeholder="e.g. Tree Surgery">
    <button class="btn btn-primary" style="flex:0;padding:0 18px;white-space:nowrap;" onclick="selectCustomService()">Next</button></div></div>`;

  if (step === 2) return `
    <h2>What Was Done?</h2>
    <div class="grid-options">
      <button class="option-btn" onclick="selectTask('Routine Maintenance')">Routine Maintenance</button>
      <button class="option-btn" onclick="selectTask('New Project')">New Project</button>
      <button class="option-btn" onclick="selectTask('Seasonal Cleanup')">Seasonal Cleanup</button>
    </div>
    <div class="divider"><p>Or describe what was done:</p>
    <div class="input-row"><input type="text" id="custom-task-input" placeholder="e.g. Planted new hedges">
    <button class="btn btn-primary" style="flex:0;padding:0 18px;white-space:nowrap;" onclick="selectCustomTask()">Next</button></div></div>
    <div class="actions"><button class="btn btn-secondary" onclick="prevStep()">Back</button></div>`;

  if (step === 3) return `
    <h2>Your Experience</h2>
    <div class="grid-options">
      <button class="option-btn" id="exp-exceptional" onclick="selectExperience('Exceptional')">Exceptional</button>
      <button class="option-btn" id="exp-good" onclick="selectExperience('Good')">Good</button>
      <button class="option-btn" id="exp-average" onclick="selectExperience('Average')">Average</button>
    </div>
    <div class="divider"><p>Describe in your own words (optional):</p>
    <textarea id="custom-experience-input" rows="2" placeholder="e.g. The garden looks stunning, team was very professional..."></textarea></div>
    <div class="divider" style="border-top:none;padding-top:0;margin-top:0;"><p>Add specific details (optional):</p>
    <textarea id="additional-details" rows="2" placeholder="e.g. Highly recommend for any garden transformation."></textarea></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="prevStep()">Back</button>
      <button class="btn btn-primary" id="gen-btn" onclick="generateReview()">Generate Review</button>
    </div>`;

  if (step === 4) return `
    <h2>✅ Your Review Is Ready!</h2>
    <div style="text-align: center; margin-bottom: 15px; font-size: 0.85rem; color: var(--accent); font-weight: 500;">
      Follow 2 simple steps to post:
    </div>
    
    <div style="background: rgba(46, 204, 113, 0.1); border: 1px dashed var(--accent); border-radius: 12px; padding: 12px; margin-bottom: 15px; font-size: 0.8rem; line-height: 1.4;">
      <strong>Step 1:</strong> Click "Copy Review" below.<br>
      <strong>Step 2:</strong> Click "Post on Google" and <strong>Paste</strong> your review there.
    </div>

    <div class="result-area result-text">
      <div class="copied-badge">Copied!</div>
    </div>
    
    <div class="result-actions">
      <button class="btn btn-primary" onclick="copyToClipboard()">1. Copy Review</button>
      <button class="btn btn-success" onclick="postOnGoogle()">2. Post on Google</button>
      
      <button class="btn btn-regen btn-regen-step" style="margin-top: 10px;" onclick="generateReview()">Try Different Phrasing</button>
      <button class="btn btn-restart" onclick="resetApp()">Start Over</button>
    </div>`;
}

function renderStep(step) {
  const html = getFormHTML(step);
  const mForm = document.getElementById('mobile-form');
  const dForm = document.getElementById('desktop-form');
  if (mForm) mForm.innerHTML = html;
  if (dForm) dForm.innerHTML = html;
  updateIndicators(step);
}

function updateIndicators(step) {
  for (let i = 1; i <= 4; i++) {
    const mdot = document.getElementById(`mdot-${i}`);
    const dstep = document.getElementById(`dstep-${i}`);
    if (mdot) { mdot.classList.toggle('active', i <= step); }
    if (dstep) {
      dstep.classList.remove('active','done');
      if (i === step) dstep.classList.add('active');
      else if (i < step) dstep.classList.add('done');
    }
  }
}

function selectService(s) { selections.service = s; currentStep = 2; renderStep(2); }
function selectCustomService() {
  const inputs = document.querySelectorAll('#custom-service-input');
  let v = '';
  inputs.forEach(input => { if (input.value) v = input.value; });
  if (!v) return alert('Please type a service name');
  selections.service = v; currentStep = 2; renderStep(2);
}
function selectTask(t) { selections.task = t; currentStep = 3; renderStep(3); }
function selectCustomTask() {
  const inputs = document.querySelectorAll('#custom-task-input');
  let v = '';
  inputs.forEach(input => { if (input.value) v = input.value; });
  if (!v) return alert('Please type what was done');
  selections.task = v; currentStep = 3; renderStep(3);
}
function selectExperience(e) {
  selections.experience = e;
  ['exceptional','good','average'].forEach(x => {
    const els = document.querySelectorAll(`#exp-${x}`);
    els.forEach(el => el.classList.toggle('selected', x === e.toLowerCase()));
  });
  const cis = document.querySelectorAll('#custom-experience-input');
  cis.forEach(ci => ci.value = '');
}
function prevStep() { if (currentStep > 1) { currentStep--; renderStep(currentStep); } }

async function generateReview() {
  const customExps = document.querySelectorAll('#custom-experience-input');
  let customExp = '';
  customExps.forEach(input => { if (input.value) customExp = input.value; });

  if (!selections.experience && !customExp) return alert('Please select or describe your experience!');
  
  const detailInputs = document.querySelectorAll('#additional-details');
  detailInputs.forEach(input => { if (input.value) selections.details = input.value; });
  
  const expVal = customExp || selections.experience;

  const btns = document.querySelectorAll('#gen-btn, .btn-regen-step');
  btns.forEach(btn => { btn.innerHTML = 'Generating...'; btn.disabled = true; });

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: "You are a customer writing a Google review for Green Nature Garden and Landscaping in Cork, Ireland (Frankfield, Douglas, Kinsale). Use a professional, warm, impressed tone. 50-100 words. Mention 'attention to detail', 'professionalism', and 'Cork'. No emojis." },
          { role: 'user', content: `Service: ${selections.service}, Task: ${selections.task}, Experience: ${expVal}. Details: ${selections.details || 'None'}.` }
        ],
        temperature: 0.75, max_tokens: 200
      })
    });
    if (!res.ok) throw new Error('API failed');
    const data = await res.json();
    let review = data.choices[0].message.content.trim().replace(/^[\"']|[\"']$/g, '');
    currentStep = 4; renderStep(4);
    
    document.querySelectorAll('.result-text').forEach(el => {
      el.innerHTML = `<div class="copied-badge">Copied!</div>${review}`;
    });
  } catch(err) {
    let t = templates[Math.floor(Math.random()*templates.length)];
    let review = t.replace('{service}',selections.service.toLowerCase()).replace('{task}',selections.task.toLowerCase()).replace('{details}',selections.details?` ${selections.details}.`:'');
    currentStep = 4; renderStep(4);
    
    document.querySelectorAll('.result-text').forEach(el => {
      el.innerHTML = `<div class="copied-badge">Copied!</div>${review}`;
    });
  }
  btns.forEach(btn => { 
    if (btn.classList.contains('btn-regen-step')) btn.innerHTML = 'Try Different Phrasing';
    else btn.innerHTML = 'Generate Review'; 
    btn.disabled = false; 
  });
}

function copyToClipboard() {
  const el = document.querySelector('.result-text');
  if (!el) return;
  const text = el.innerText.replace('Copied!','').trim();
  navigator.clipboard.writeText(text).then(() => {
    document.querySelectorAll('.copied-badge').forEach(badge => {
      badge.classList.add('show');
      setTimeout(()=>badge.classList.remove('show'),2000);
    });
  });
}
function postOnGoogle() { window.open('https://search.google.com/local/writereview?placeid=ChIJRTG6s8CPREgRkywKsEwgAzc','_blank'); }
function resetApp() {
  selections = { service:'', task:'', experience:'', details:'' };
  currentStep = 1; renderStep(1);
}

// Init
renderStep(1);
</script>
</body>
</html>
